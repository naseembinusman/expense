<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>SpendWise</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

  <!-- ── Auth Screen ── -->
  <div id="authScreen" class="screen active">
    <div class="auth-hero">
      <div class="auth-logo">
        <svg width="40" height="40" viewBox="0 0 40 40" fill="none">
          <circle cx="20" cy="20" r="20" fill="var(--teal)"/>
          <path d="M12 20h16M20 12v16" stroke="white" stroke-width="2.5" stroke-linecap="round"/>
          <circle cx="20" cy="20" r="6" stroke="white" stroke-width="2"/>
        </svg>
        <span>SpendWise</span>
      </div>
      <p class="auth-tagline">Track every dirham, every day.</p>
    </div>

    <div class="auth-card">
      <div class="tab-toggle">
        <button class="tab-btn active" onclick="switchAuthTab('login')">Sign In</button>
        <button class="tab-btn" onclick="switchAuthTab('register')">Create Account</button>
      </div>

      <div id="loginForm">
        <div class="field">
          <label>Username</label>
          <input id="loginUser" type="text" placeholder="your username" autocomplete="username" />
        </div>
        <div class="field">
          <label>Password</label>
          <input id="loginPass" type="password" placeholder="••••••••" autocomplete="current-password" />
        </div>
        <div id="loginError" class="error-msg"></div>
        <button class="btn-primary full" onclick="doLogin()">Sign In</button>
      </div>

      <div id="registerForm" class="hidden">
        <div class="field">
          <label>Username</label>
          <input id="regUser" type="text" placeholder="choose a username" autocomplete="username" />
        </div>
        <div class="field">
          <label>Password</label>
          <input id="regPass" type="password" placeholder="min 4 characters" autocomplete="new-password" />
        </div>
        <div id="regError" class="error-msg"></div>
        <button class="btn-primary full" onclick="doRegister()">Create Account</button>
      </div>
    </div>
  </div>

  <!-- ── Main App Screen ── -->
  <div id="appScreen" class="screen">

    <!-- Top Bar -->
    <header class="topbar">
      <div class="topbar-left">
        <svg width="22" height="22" viewBox="0 0 40 40" fill="none">
          <circle cx="20" cy="20" r="20" fill="var(--teal)"/>
          <path d="M12 20h16M20 12v16" stroke="white" stroke-width="2.5" stroke-linecap="round"/>
          <circle cx="20" cy="20" r="6" stroke="white" stroke-width="2"/>
        </svg>
        <span class="topbar-title">SpendWise</span>
      </div>
      <div class="topbar-right">
        <span id="topbarUser" class="topbar-user"></span>
        <button class="icon-btn" onclick="doLogout()" title="Sign out">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
            <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/>
          </svg>
        </button>
      </div>
    </header>

    <!-- Bottom Nav -->
    <nav class="bottom-nav">
      <button class="nav-btn active" onclick="showTab('dashboard')" data-tab="dashboard">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>
        <span>Dashboard</span>
      </button>
      <button class="nav-btn" onclick="showTab('add')" data-tab="add">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="16"/><line x1="8" y1="12" x2="16" y2="12"/></svg>
        <span>Add</span>
      </button>
      <button class="nav-btn" onclick="showTab('history')" data-tab="history">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="12 8 12 12 14 14"/><path d="M3.05 11a9 9 0 1 1 .5 4"/><polyline points="3 16 3 11 8 11"/></svg>
        <span>History</span>
      </button>
      <button class="nav-btn" onclick="showTab('accounts')" data-tab="accounts">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="7" width="20" height="14" rx="2"/><path d="M16 7V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v2"/></svg>
        <span>Accounts</span>
      </button>
    </nav>

    <!-- Content Area -->
    <main class="content">

      <!-- Dashboard Tab -->
      <div id="tab-dashboard" class="tab active">
        <div class="section-title">Overview</div>
        <div id="summaryCards" class="summary-cards"></div>
        <div class="section-title">Recent Transactions</div>
        <div id="recentTx" class="tx-list"></div>
      </div>

      <!-- Add Transaction Tab -->
      <div id="tab-add" class="tab">
        <div class="section-title">New Transaction</div>

        <div class="tx-type-toggle">
          <button class="type-btn active" onclick="setTxType('expense')" id="btnExpense">Expense</button>
          <button class="type-btn" onclick="setTxType('transfer')" id="btnTransfer">Transfer</button>
        </div>

        <div class="card form-card">
          <div class="field">
            <label id="labelFrom">From Account <span class="hint">(your money)</span></label>
            <select id="fromAccount"></select>
          </div>
          <div class="field">
            <label id="labelTo">To Category <span class="hint">(where spent)</span></label>
            <select id="toAccount"></select>
          </div>
          <div class="field">
            <label>Amount (AED)</label>
            <input id="txAmount" type="number" placeholder="0.00" min="0.01" step="0.01" inputmode="decimal" />
          </div>
          <div class="field">
            <label>Description <span class="hint">(optional)</span></label>
            <input id="txDesc" type="text" placeholder="e.g. Lunch at Shake Shack" />
          </div>
          <div class="field">
            <label>Date</label>
            <input id="txDate" type="date" />
          </div>
          <div id="addTxError" class="error-msg"></div>
          <button class="btn-primary full" onclick="addTransaction()">Save Transaction</button>
        </div>
      </div>

      <!-- History Tab -->
      <div id="tab-history" class="tab">
        <div class="section-title">All Transactions</div>
        <div class="filter-row">
          <select id="filterAccount" onchange="loadHistory()">
            <option value="">All accounts</option>
          </select>
        </div>
        <div id="historyList" class="tx-list"></div>
      </div>

      <!-- Accounts Tab -->
      <div id="tab-accounts" class="tab">
        <div class="section-title">My Accounts
          <button class="btn-sm" onclick="openAddAccountModal('asset')">+ Add Account</button>
        </div>
        <div id="assetAccountList" class="account-list"></div>

        <div class="section-title" style="margin-top:24px">Expense Categories
          <button class="btn-sm" onclick="openAddAccountModal('expense')">+ Add Category</button>
        </div>
        <div id="expenseAccountList" class="account-list"></div>
      </div>

    </main>
  </div>

  <!-- ── Modal: Add Account ── -->
  <div id="modalOverlay" class="modal-overlay hidden" onclick="closeModal()">
    <div class="modal-card" onclick="event.stopPropagation()">
      <div class="modal-title" id="modalTitle">Add Account</div>
      <div class="field">
        <label id="modalLabel">Account Name / Alias</label>
        <input id="modalName" type="text" placeholder="e.g. ENBD Savings" />
      </div>
      <input type="hidden" id="modalType" />
      <div id="modalError" class="error-msg"></div>
      <div class="modal-actions">
        <button class="btn-ghost" onclick="closeModal()">Cancel</button>
        <button class="btn-primary" onclick="saveAccount()">Add</button>
      </div>
    </div>
  </div>

  <script src="js/app.js"></script>
</body>
</html>
